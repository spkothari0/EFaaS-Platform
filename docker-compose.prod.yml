version: '3.9'

# Production-ready Docker Compose configuration
# Resource limits, restart policies, and optimizations for production environment

services:
  # PostgreSQL Instances with resource limits
  postgres-tenant:
    image: postgres:16-alpine
    container_name: efaas-postgres-tenant-prod
    environment:
      POSTGRES_DB: tenants_db
      POSTGRES_USER: efaas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: on-failure:5
    volumes:
      - postgres-tenant-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efaas -d tenants_db"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  postgres-payment:
    image: postgres:16-alpine
    container_name: efaas-postgres-payment-prod
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: efaas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: on-failure:5
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efaas -d payments_db"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  postgres-lending:
    image: postgres:16-alpine
    container_name: efaas-postgres-lending-prod
    environment:
      POSTGRES_DB: lending_db
      POSTGRES_USER: efaas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: on-failure:5
    volumes:
      - postgres-lending-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efaas -d lending_db"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  postgres-investment:
    image: postgres:16-alpine
    container_name: efaas-postgres-investment-prod
    environment:
      POSTGRES_DB: investments_db
      POSTGRES_USER: efaas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: on-failure:5
    volumes:
      - postgres-investment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efaas -d investments_db"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  postgres-fraud:
    image: postgres:16-alpine
    container_name: efaas-postgres-fraud-prod
    environment:
      POSTGRES_DB: fraud_db
      POSTGRES_USER: efaas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: on-failure:5
    volumes:
      - postgres-fraud-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efaas -d fraud_db"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  # Zookeeper with resource limits
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: efaas-zookeeper-prod
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    restart: on-failure:5
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  # Kafka with resource limits
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: efaas-kafka-prod
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    restart: on-failure:5
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  # Redis with resource limits and persistence
  redis:
    image: redis:7-alpine
    container_name: efaas-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: on-failure:5
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

  # TigerGraph with resource limits
  tigergraph:
    image: tigergraph/tigergraph-oss:latest
    container_name: efaas-tigergraph-prod
    environment:
      COMPOSE_HTTP_TIMEOUT: 200
      COMPOSE_REQUEST_TIMEOUT: 200
      TG_ADMIN: admin
      TG_PASSWORD: ${TG_PASSWORD}
    restart: on-failure:5
    volumes:
      - tigergraph-data:/home/tigergraph
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000/api/ping || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '1'
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - efaas-network

volumes:
  postgres-tenant-data:
    driver: local
  postgres-payment-data:
    driver: local
  postgres-lending-data:
    driver: local
  postgres-investment-data:
    driver: local
  postgres-fraud-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  redis-data:
    driver: local
  tigergraph-data:
    driver: local

networks:
  efaas-network:
    driver: bridge
