spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: tenant-service
          uri: http://tenant-service:8081
          predicates:
            - Path=/api/v1/tenants/**
          filters:
            - StripPrefix=2
      # Global filters
      default-filters:
        - name: RequestLogging
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # This will enable/disable the gateway globally
  java:
    version: 17

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.efaas: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
