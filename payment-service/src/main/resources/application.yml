spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5434/payments_db
    username: efaas
    password: dev_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

plaid:
  client-id: ${PLAID_CLIENT_ID:test-client-id}
  secret: ${PLAID_SECRET:test-secret}
  env: ${PLAID_ENV:sandbox}
  webhook-url: ${PLAID_WEBHOOK_URL:http://localhost:8082/webhooks/plaid}

kafka:
  topics:
    payments: payments-topic
    plaid: plaid-topic

logging:
  level:
    root: INFO
    com.efaas: DEBUG
    org.hibernate.engine.jdbc.env.internal.JdbcEnvironment: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
